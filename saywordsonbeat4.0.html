<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Say Words on Beat-熊猫词语卡点练习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #000;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .video-wrapper {
            position: fixed; inset: 0; z-index: 5;
            display: flex; align-items: center; justify-content: center; background: #000;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        #game-layer {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 15px; width: 95vw; max-width: 1000px; height: 50vh;
        }

        .word-box {
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid #fff;
            border-radius: 24px;
            display: flex; flex-direction: row; align-items: center; justify-content: center;
            color: #1e293b;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            opacity: 0; 
            padding: 10px;
            transform: scale(1);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-active { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .keep-visible { opacity: 1; transform: scale(1); }

        .highlight-border {
            border-color: #4A7C74 !important; 
            box-shadow: 0 0 50px rgba(74, 124, 116, 0.8) !important;
            z-index: 20;
            transform: scale(1.02);
        }

        .char-unit { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; margin: 0 4px; }
        .pinyin-text { font-size: clamp(1.2rem, 4vw, 2.2rem); margin-bottom: 0.1em; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 500; color: #4A7C74; }
        
        .kanji-text { font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 700; color: #2B2B2B; transition: font-size 0.2s; }
        .no-pinyin .kanji-text { font-size: clamp(2.5rem, 8vw, 4.8rem); }
        .no-pinyin .pinyin-text { display: none; }

        #ui-panel {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: #EAF7F4; padding: 22px; border-radius: 32px;
            border: 2px solid #CFE5E0; width: 92%; max-width: 600px;
            display: flex; flex-direction: column; gap: 14px; backdrop-filter: blur(5px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            max-height: 90vh; overflow-y: auto;
        }

        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .label-text { font-size: 0.85rem; color: #2B2B2B; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        .opt-btn { 
            background: #FFFFFF; color: #333; padding: 10px 5px; border-radius: 14px; 
            cursor: pointer; flex: 1; text-align: center; transition: all 0.2s; 
            border: 2px solid #DADADA; display: flex; flex-direction: column; line-height: 1.2;
            position: relative; overflow: hidden;
        }
        .opt-btn:hover { background: #F2FBF9; }
        .opt-btn.active { background: #D4F1EC; border-color: #7FC8C0; color: #2B2B2B; transform: translateY(-1px); }
        .opt-btn.active::after { content: ''; position: absolute; top: 6px; right: 6px; width: 4px; height: 4px; background-color: #E53935; border-radius: 50%; }

        .btn-start { 
            background: #4A7C74; color: white; padding: 14px; border-radius: 18px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; text-align: center; margin-top: 5px; box-shadow: 0 10px 20px -5px rgba(74, 124, 116, 0.3);
            transition: opacity 0.2s;
        }
        .btn-start:hover { opacity: 0.9; }

        #stop-btn { background: #CFE5E0; color: #4A7C74; padding: 10px; border-radius: 18px; cursor: pointer; text-align: center; display: none; font-weight: bold; }
        
        textarea, select { background: #FFFFFF; border: 2px solid #CFE5E0; padding: 10px; border-radius: 14px; color: #2B2B2B; outline: none; transition: border-color 0.2s; }

        .history-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .history-item { 
            background: white; border: 1px solid #CFE5E0; padding: 4px 10px; border-radius: 10px; 
            font-size: 12px; color: #4A7C74; cursor: pointer; max-width: 150px; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: all 0.2s;
        }
        .history-item:hover { background: #D4F1EC; border-color: #7FC8C0; }
        .more-toggle { font-size: 12px; color: #94a3b8; cursor: pointer; padding: 4px; text-decoration: underline; }

        .signature-area { background: #F2FBF9; margin: 0 -22px -22px -22px; padding: 10px; text-align: center; border-bottom-left-radius: 32px; border-bottom-right-radius: 32px; border-top: 1px solid #CFE5E0; }
        .signature-text { font-size: 10px; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        #badge { border-color: #7FC8C0; color: #4A7C74; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="v1" playsinline preload="auto" muted>
            <source src="https://raw.githubusercontent.com/hs8592592/say-words-on-beat-/main/1-yasuo.mp4" type="video/mp4">
        </video>
        <video id="v2" playsinline loop style="display:none;" preload="auto" muted>
            <source src="https://raw.githubusercontent.com/hs8592592/say-words-on-beat-/main/2-yasuo.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-layer">
        <div id="badge" class="absolute top-10 bg-white/95 px-8 py-3 rounded-full text-xl shadow-xl border-2 font-bold">READY?</div>
        <div class="grid-container" id="grid"></div>
    </div>

    <div id="ui-panel">
        <div id="setup-controls" class="flex flex-col gap-4">
            <div class="flex gap-4">
                <div class="control-group flex-1">
                    <span class="label-text">模式 Mode</span>
                    <div class="flex gap-2">
                        <div class="opt-btn mode-sel active" data-type="fixed"><span class="cn-label">固定</span><span class="en-label">Fixed</span></div>
                        <div class="opt-btn mode-sel" data-type="random"><span class="cn-label">随机</span><span class="en-label">Rand</span></div>
                        <div class="opt-btn mode-sel" data-type="custom"><span class="cn-label">自定义</span><span class="en-label">Cust</span></div>
                    </div>
                </div>
                <div class="control-group w-1/4">
                    <span class="label-text">拼音 Pinyin</span>
                    <div id="pinyin-toggle" class="opt-btn active">
                        <span class="cn-label">开启</span><span class="en-label">ON</span>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <span class="label-text">输入词语 Word List</span>
                <textarea id="words" rows="2" placeholder="苹果, 熊猫, 老师"></textarea>
                <div id="history-container">
                    <div class="history-wrap" id="history-list"></div>
                    <div id="more-history" class="more-toggle" style="display:none;">显示更多历史记录...</div>
                </div>
            </div>

            <div class="flex gap-3 items-end">
                <div class="control-group w-1/4">
                    <span class="label-text">每页重复次数</span>
                    <select id="repeat-count">
                        <option value="1">1</option>
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="control-group flex-1">
                    <span class="label-text">速度控制 Speed Control</span>
                    <div class="flex gap-1">
                        <div class="opt-btn speed-btn active" data-mode="1"><span class="cn-label">慢</span><span class="en-label">Slow</span></div>
                        <div class="opt-btn speed-btn" data-mode="2"><span class="cn-label">中</span><span class="en-label">Med</span></div>
                        <div class="opt-btn speed-btn" data-mode="3"><span class="cn-label">快</span><span class="en-label">Fast</span></div>
                    </div>
                </div>
            </div>

            <div id="start-btn" class="btn-start">开始训练 START TRAINING</div>
            <div class="signature-area"><span class="signature-text">Designed by Sun Hao</span></div>
        </div>
        <div id="stop-btn">停止训练 STOP TRAINING</div>
    </div>

    <script>
        const { pinyin } = pinyinPro;
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const grid = document.getElementById('grid');
        const badge = document.getElementById('badge');
        const wordsArea = document.getElementById('words');
        const historyListEl = document.getElementById('history-list');
        const moreHistoryBtn = document.getElementById('more-history');

        let pages = []; 
        let isRunning = false;
        let selectedSpeed = 1;
        let currentMode = 'fixed';
        let showPinyin = true;
        let rAFId = null;

        const CONFIG = {
            1: { speed: 0.5, interval: 5.352 }, 
            2: { speed: 0.7, interval: 3.824 }, 
            3: { speed: 1.0, interval: 2.676 } 
        };

        let historyData = JSON.parse(localStorage.getItem('panda_history') || '[]');

        function updateHistoryUI(expanded = false) {
            historyListEl.innerHTML = '';
            const toShow = expanded ? historyData : historyData.slice(0, 3);
            toShow.forEach(text => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerText = text;
                item.onclick = () => { wordsArea.value = text; };
                historyListEl.appendChild(item);
            });
            moreHistoryBtn.style.display = (historyData.length > 3 && !expanded) ? 'block' : 'none';
        }

        function saveHistory(text) {
            if (!text) return;
            historyData = historyData.filter(i => i !== text);
            historyData.unshift(text);
            if (historyData.length > 10) historyData.pop();
            localStorage.setItem('panda_history', JSON.stringify(historyData));
            updateHistoryUI();
        }

        moreHistoryBtn.onclick = () => updateHistoryUI(true);

        document.getElementById('pinyin-toggle').onclick = function() {
            showPinyin = !showPinyin;
            this.classList.toggle('active');
            this.querySelector('.cn-label').innerText = showPinyin ? "开启" : "关闭";
            grid.classList.toggle('no-pinyin', !showPinyin);
        };

        document.querySelectorAll('.mode-sel').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-sel').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.type;
            };
        });

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedSpeed = parseInt(btn.dataset.mode);
            };
        });

        function createGrid() {
            grid.innerHTML = '';
            for(let i=0; i<8; i++) {
                const div = document.createElement('div');
                div.className = 'word-box';
                div.id = `box-${i}`;
                grid.appendChild(div);
            }
        }

        async function startSession() {
            const raw = wordsArea.value.trim();
            if(!raw) return;

            saveHistory(raw);
            const inputList = raw.split(/[,，;；]/).map(s => s.trim()).filter(s => s);
            pages = [];

            if(currentMode === 'fixed') {
                inputList.forEach(word => { pages.push(Array(8).fill(word)); });
            } else if(currentMode === 'random') {
                for(let i=0; i < Math.max(inputList.length, 5); i++) {
                    let pageWords = [];
                    for(let j=0; j<8; j++) pageWords.push(inputList[Math.floor(Math.random() * inputList.length)]);
                    pages.push(pageWords);
                }
            } else if(currentMode === 'custom') {
                let pageWords = [];
                for(let j=0; j<8; j++) pageWords.push(inputList[j % inputList.length]);
                pages.push(pageWords);
            }

            isRunning = true;
            document.getElementById('setup-controls').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';
            createGrid();
            
            v1.style.display = 'block'; v2.style.display = 'none';
            v1.currentTime = 0;
            v1.muted = false; // 确保播放音频
            
            // 解决切换卡顿：播放视频1的同时预热视频2
            const playPromise = v1.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("需要用户交互才能播放音频");
                    v1.muted = true;
                    v1.play();
                });
            }
            v2.load(); 
            
            v1.onended = () => { if(isRunning) enterLoopMode(); };
        }

        function enterLoopMode() {
            v1.style.display = 'none';
            v2.style.display = 'block';
            v2.muted = false; 
            v2.playbackRate = CONFIG[selectedSpeed].speed;
            v2.play();
            document.getElementById('game-layer').style.opacity = '1';
            startRhythm();
        }

        function startRhythm() {
            let startTime = performance.now();
            const interval = CONFIG[selectedSpeed].interval * 1000;
            const repeatPerPage = parseInt(document.getElementById('repeat-count').value);

            function run() {
                if (!isRunning) return;
                const now = performance.now();
                const elapsedSinceStart = now - startTime;
                const actionRound = Math.floor(elapsedSinceStart / interval) + 1;
                const roundElapsed = elapsedSinceStart % interval;
                const activeIndex = Math.floor(roundElapsed / (interval / 8));

                if (actionRound === 1) {
                    badge.innerText = "READY?";
                    document.querySelectorAll('.word-box').forEach(box => { box.style.opacity = "0"; box.className = 'word-box'; });
                } else {
                    const effectiveRound = actionRound - 1; 
                    const roundsPerPage = repeatPerPage * 2;
                    const pageIdx = Math.floor((effectiveRound - 1) / roundsPerPage);
                    
                    if (pageIdx >= pages.length) { location.reload(); return; }

                    const currentPageData = pages[pageIdx];
                    const roundInPage = (effectiveRound - 1) % roundsPerPage;
                    const cycleType = roundInPage % 2; 

                    document.querySelectorAll('.word-box').forEach((box, i) => {
                        const word = currentPageData[i];
                        if (box.dataset.word !== word) {
                            const py = pinyin(word, { type: 'array' });
                            box.innerHTML = word.split('').map((c, idx) => 
                                `<div class="char-unit">
                                    <div class="pinyin-text">${py[idx]||''}</div>
                                    <div class="kanji-text">${c}</div>
                                </div>`
                            ).join('');
                            box.dataset.word = word;
                        }

                        if (cycleType === 0) {
                            if (i < activeIndex) { box.className = 'word-box keep-visible'; box.style.opacity = "1"; }
                            else if (i === activeIndex) { box.className = 'word-box pop-active'; box.style.opacity = "1"; }
                            else { box.style.opacity = "0"; box.className = 'word-box'; }
                        } else {
                            box.style.opacity = "1";
                            box.className = i === activeIndex ? 'word-box keep-visible highlight-border' : 'word-box keep-visible';
                        }
                    });
                    badge.innerText = currentMode === 'fixed' ? currentPageData[0] : "TRAINING...";
                }
                rAFId = requestAnimationFrame(run);
            }
            rAFId = requestAnimationFrame(run);
        }

        document.getElementById('start-btn').onclick = startSession;
        document.getElementById('stop-btn').onclick = () => location.reload();
        
        window.onload = () => {
            createGrid();
            updateHistoryUI();
            v1.load();
            v2.load();
        };
    </script>
</body>
</html>
